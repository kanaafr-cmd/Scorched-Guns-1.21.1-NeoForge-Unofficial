[[mods]]
modId="apothic_boss_health_compat"
version="${mod_version}"
displayName="Apothic Boss Health Compat"
authors="Codex"
description='''Keeps Apotheosis/Apothic boss and invader health full after max-health modifiers and supplies pack-specific data.'''

[[mods]]
modId="creating_space_config_load_fix"
version="${mod_version}"
displayName="Creating Space Config Load Fix"
authors="Codex"
description='''Guards early config reads that happen before NeoForge has loaded configs.'''

[[mods]]
modId="architectury_dsurround_modlist_fix"
version="${mod_version}"
displayName="Architectury Dynamic Surroundings Mod List Fix"
authors="Codex"
description='''Skips broken Architectury mod-list wrappers during Dynamic Surroundings resource lookup.'''

[[mods]]
modId="dynamic_trees_roots_family_fix"
version="${mod_version}"
displayName="Dynamic Trees Roots Family Fix"
authors="Codex"
description='''Prevents unresolved Dynamic Trees roots families from crashing block-state cache baking.'''

[[mods]]
modId="quark_zeta_early_glint_fix"
version="${mod_version}"
displayName="Quark Zeta Early Glint Fix"
authors="Codex"
description='''Prevents Quark glint render type setup from initializing Zeta before NeoForge has an active mod container.'''

